<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Curriculo de Kaio Henrique.">
    <title>Currículo - kaiohsg.dev</title>
    <link rel="stylesheet" href="/src/css/reset.css">
    <link rel="icon" href="/src/img/curriculo-icon.png">
    <link rel="stylesheet" href="/src/css/kaiohsg.css">
    <style>
        body {
            background-color: #fff;
        }
        
        #content p {
            font-size: 22px;
            color: #595959;
            margin-bottom: 10px;
        }
        #content a {
            color: #3184e2;
            font-size: 18px;
            text-decoration: none;
        }
        #content a:hover{
            text-decoration: underline;
        }

        #summary {
            background-color: #000000c0;
            position: fixed;
            bottom: 35px;
            padding: 7px;
            border-radius: 3px;
            margin-left: 15px;
        }
        #summary p {
            font-size: 22px;
            color: #595959;
            margin-bottom: 10px;
        }
        #summary a {
            color: #3184e2;
            font-size: 18px;
            text-decoration: none;
        }
        #summary a:hover{
            text-decoration: underline;
        }

        #curriculo-pdf {
            position:fixed; 
            top:0;
            left:0;
            bottom:0;
            right:0;
            width:100%;
            height: 98vh;
            border: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        footer {
            background-color: #d6d6d6;
        }
        footer p {
            color: #595959;
        }
    </style>
</head>
<body>
    <div id="content">
        <object id="curriculo-pdf" type="text/html" data="https://docs.google.com/gview?url=https://kaiohsg.github.io/src/pdf/curriculo-kaio-henrique.pdf&embedded=true">

        </object>
    </div>
    <div id="summary">
        <ul>
            <li><a href="/">◀️ Início</a></li>
        </ul>
    </div>
    <footer>
        <p>2023 Kaio HSG</p>
